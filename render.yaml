services:
  - type: web
    name: e3p-platform
    env: docker
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: WORKERS
        value: 2
      - key: MAX_COMPILES
        value: 8
